<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Set Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="hud-container">
        <header class="hud-header">
            <h1>Number Set Generator</h1>
        </header>

        <div class="controls">
            <select id="count-select">
                <option value="1">1 Set</option>
                <option value="5">5 Sets</option>
                <option value="10">10 Sets</option>
            </select>

            <select id="mode-select">
                <option value="single">Digit Sequence</option>
                <option value="multiplication">Multiplication Pairs</option>
            </select>

            <button id="generate-button">Generate</button>
            <button id="copy-output">Copy Output</button>
        </div>

        <main class="question-display">
            <pre id="output" class="output-text"></pre>
        </main>

        <div class="history">
            <h3>History</h3>
            <ul id="history-list"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
